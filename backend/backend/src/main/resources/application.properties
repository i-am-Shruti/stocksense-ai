spring.application.name=backend

# For local: uses these values. For Render with DATABASE_URL set, uses DATABASE_URL instead
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/stocksense_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:stocksense123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:stocksense_super_secret_key_2026_do_not_share}
jwt.expiration=86400000

ml.service.url=${ML_SERVICE_URL:https://stocksense-ai-bdd9.onrender.com}

logging.level.com.stocksense=DEBUG

# Don't initialize database on startup (fixes null datasource issue)
spring.jpa.defer-datasource-initialization=true